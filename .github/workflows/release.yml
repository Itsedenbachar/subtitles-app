name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install
        working-directory: subtitle-app

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python3 -c "
          import json
          with open('subtitle-app/src-tauri/tauri.conf.json') as f:
              c = json.load(f)
          c['version'] = '$VERSION'
          with open('subtitle-app/src-tauri/tauri.conf.json', 'w') as f:
              json.dump(c, f, indent=2)
          "
          sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" subtitle-app/src-tauri/Cargo.toml

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: subtitle-app
          args: --target aarch64-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'New update — open the app to install automatically.'
          releaseDraft: false
          prerelease: false
