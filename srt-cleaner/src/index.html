<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRT Cleaner</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #1a1a1a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 24px;
      gap: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f0f0f0;
      flex-shrink: 0;
    }

    h1 span {
      color: #4a9eff;
    }

    textarea {
      flex: 1;
      width: 100%;
      background: #111;
      color: #f0f0f0;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
      font-family: "SF Mono", "Fira Code", "Menlo", monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
      transition: border-color 0.15s ease;
    }

    textarea::placeholder {
      color: #555;
    }

    textarea:focus {
      border-color: #4a9eff;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    button {
      padding: 10px 22px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    #btn-save {
      background: #4a9eff;
      color: #fff;
    }

    #btn-save:hover {
      opacity: 0.88;
    }

    #btn-clear {
      background: #2a2a2a;
      color: #aaa;
      border: 1px solid #333;
    }

    #btn-clear:hover {
      color: #f0f0f0;
      border-color: #555;
    }

    .status-bar {
      flex-shrink: 0;
      height: 20px;
      font-size: 13px;
      color: #888;
      letter-spacing: 0.01em;
    }

    .status-bar.success { color: #4caf7d; }
    .status-bar.error   { color: #e06c75; }
    .status-bar.warning { color: #e5c07b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SRT <span>Cleaner</span></h1>

    <textarea
      id="input"
      spellcheck="false"
      placeholder="Paste your Google AI Studio transcription here..."
    ></textarea>

    <div class="actions">
      <button id="btn-save">Clean &amp; Save .srt</button>
      <button id="btn-clear">Clear</button>
    </div>

    <div class="status-bar" id="status"></div>
  </div>

  <script src="srt.js"></script>
  <script>
    const input  = document.getElementById('input');
    const status = document.getElementById('status');

    function setStatus(message, type) {
      status.textContent = message;
      status.className = 'status-bar' + (type ? ' ' + type : '');
    }

    document.getElementById('btn-clear').addEventListener('click', function () {
      input.value = '';
      setStatus('', '');
    });

    document.getElementById('btn-save').addEventListener('click', async function () {
      const raw = input.value;

      if (!raw.trim()) {
        setStatus('⚠️ Nothing to convert', 'warning');
        return;
      }

      const validation = window.validateSRT(raw);
      if (!validation.valid) {
        setStatus('❌ ' + validation.error, 'error');
        return;
      }

      const cleaned = window.cleanSRT(raw);

      try {
        const result = await window.__TAURI__.core.invoke('save_srt', {
          filename: 'subtitles.srt',
          content: cleaned,
        });
        setStatus('✅ Saved to ' + result, 'success');
      } catch (err) {
        const message = typeof err === 'string' ? err : (err && err.message) ? err.message : String(err);
        if (message === 'cancelled') return;
        setStatus('❌ Error: ' + message, 'error');
      }
    });
  </script>
</body>
</html>
